<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LỊCH TRỰC</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
display:flex;
justify-content:center;
}

.container{
width:95%;
max-width:900px;
background:white;
margin:20px;
padding:15px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin:5px 0 10px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

button{
padding:6px 10px;
border-radius:6px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.filters{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
border:1px solid #ddd;
}

.header{
background:#f1f1f1;
text-align:center;
padding:6px;
font-weight:bold;
border:1px solid #ddd;
}

.day{
min-height:70px;
border:1px solid #ddd;
padding:4px;
box-sizing:border-box;
font-size:13px;
}

.date{
font-weight:bold;
}

.shift{
margin-top:4px;
padding:3px 5px;
border-radius:5px;
font-size:12px;
color:white;
display:inline-block;
}

.phuong{background:#e74c3c}
.than{background:#3498db}
.tien{background:#9b59b6}
.hoa{background:#f39c12}
.pho{background:#16a085}

.today{
outline:3px solid #27ae60;
background:#eaf7ef;
}

.todayText{
font-size:11px;
color:#27ae60;
font-weight:bold;
}

@media (max-width:600px){

h1{font-size:22px}

.day{
min-height:60px;
font-size:12px;
}

.shift{
font-size:11px;
padding:2px 4px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>LỊCH TRỰC 2026</h1>

<div class="controls">
<button onclick="prevMonth()">◀</button>
<h2 id="monthLabel"></h2>
<button onclick="nextMonth()">▶</button>
<button onclick="goToday()">Hôm nay</button>
</div>

<div class="filters">
<label><input type="checkbox" value="Phương" checked onchange="render()"> Phương</label>
<label><input type="checkbox" value="Thân" checked onchange="render()"> Thân</label>
<label><input type="checkbox" value="Tiến" checked onchange="render()"> Tiến</label>
<label><input type="checkbox" value="Hoa" checked onchange="render()"> Hoa</label>
<label><input type="checkbox" value="Phô" checked onchange="render()"> Phô</label>
</div>

<div class="calendar" id="calendar"></div>

</div>

<script>

const names=["Phương","Thân","Tiến","Hoa","Phô"]

const startDate=new Date(2026,2,9)

let currentMonth=3
let currentYear=2026

const today=new Date()

function getShift(date){

const diff=Math.floor((date-startDate)/(1000*60*60*24))

if(diff<0)return null

return names[diff%5]

}

function render(){

const cal=document.getElementById("calendar")
cal.innerHTML=""

const days=["T2","T3","T4","T5","T6","T7","CN"]

days.forEach(d=>{
const div=document.createElement("div")
div.className="header"
div.innerText=d
cal.appendChild(div)
})

const firstDay=new Date(currentYear,currentMonth-1,1)
const lastDay=new Date(currentYear,currentMonth,0).getDate()

let start=(firstDay.getDay()+6)%7

for(let i=0;i<start;i++){
const empty=document.createElement("div")
empty.className="day"
cal.appendChild(empty)
}

const checked=[...document.querySelectorAll(".filters input:checked")].map(e=>e.value)

for(let d=1;d<=lastDay;d++){

const date=new Date(currentYear,currentMonth-1,d)
const shift=getShift(date)

const day=document.createElement("div")
day.className="day"

if(
date.getDate()==today.getDate() &&
date.getMonth()==today.getMonth() &&
date.getFullYear()==today.getFullYear()
){
day.classList.add("today")
}

let html=`<div class="date">${d}`

if(
date.getDate()==today.getDate() &&
date.getMonth()==today.getMonth() &&
date.getFullYear()==today.getFullYear()
){
html+=` <span class="todayText">HÔM NAY</span>`
}

html+=`</div>`

if(shift){

if(checked.length==0){

html+=`<div class="shift ${shift.toLowerCase()}">${shift}</div>`

}else if(checked.includes(shift)){

html+=`<div class="shift ${shift.toLowerCase()}">${shift}</div>`

}

}

day.innerHTML=html

cal.appendChild(day)

}

document.getElementById("monthLabel").innerText=`Tháng ${currentMonth}/2026`

}

function prevMonth(){

if(currentMonth>3){
currentMonth--
render()
}

}

function nextMonth(){

if(currentMonth<12){
currentMonth++
render()
}

}

function goToday(){

if(today.getFullYear()==2026 && today.getMonth()+1>=3){
currentMonth=today.getMonth()+1
render()
}

}

render()

</script>

</body>
</html>
